name: Build

on:
  push:
    branches:
      - main
      - branch-*
      - kilo
  pull_request:
    types: [opened, synchronize, reopened]

# Branch-based release pipeline (aligned with sonarqube-cli / Azure Artifact Signing).
# build-binaries + signing run on main and branch-* pushes; GitHub Release publish on main only.
env:
  IS_RELEASE_BRANCH: ${{ github.event_name != 'pull_request' && (github.ref_name == github.event.repository.default_branch || startsWith(github.ref_name, 'branch-')) }}
  IS_MAIN_RELEASE: ${{ github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch }}
  SIGNING_PROFILE: ${{ (github.event_name != 'pull_request' && (github.ref_name == github.event.repository.default_branch || startsWith(github.ref_name, 'branch-'))) && 'release' || 'test' }}

jobs:
  test:
    name: Test
    runs-on: sonar-xs
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run Go library tests with coverage
        working-directory: lib/sq-api-go
        run: go test ./... -coverprofile=coverage.out -count=1
      - name: Run Go migration tool tests with coverage
        working-directory: go
        run: go test $(go list ./... | grep -v '/cmd$') -coverprofile=coverage.out -count=1
      - name: Rewrite coverage paths for SonarQube
        run: |
          sed 's|github.com/sonar-solutions/sonar-migration-tool/|go/|g' go/coverage.out > go/coverage.sonar.out
          sed 's|github.com/sonar-solutions/sq-api-go/|lib/sq-api-go/|g' lib/sq-api-go/coverage.out > lib/sq-api-go/coverage.sonar.out
      - name: Fetch Vault secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/kv/data/sonarcloud token | SONAR_TOKEN;
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).SONAR_TOKEN }}

  build-binaries:
    name: Build All Binaries
    needs: test
    if: env.IS_RELEASE_BRANCH == 'true'
    runs-on: sonar-xs
    permissions:
      id-token: write   # Vault OIDC
      contents: read
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: windows
            goarch: arm64
            suffix: windows-arm64.exe
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build binary
        working-directory: go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -o ../sonar-migration-tool-${{ matrix.suffix }} .

      - name: Vault Secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/kv/data/sign key | GPG_SIGNING_KEY;
            development/kv/data/sign passphrase | GPG_SIGNING_PASSPHRASE;

      - name: GPG-sign binary
        env:
          VAULT_SECRETS: ${{ steps.secrets.outputs.vault }}
        run: |
          set -euo pipefail
          if [ -z "${VAULT_SECRETS:-}" ]; then
            echo "::error::No secrets returned from Vault — cannot GPG-sign. The repo's Vault role likely lacks read access to development/kv/data/sign. See docs/RELEASE-SIGNING-SETUP.md."
            exit 1
          fi
          GPG_SIGNING_KEY="$(jq -er '.GPG_SIGNING_KEY' <<<"$VAULT_SECRETS")"
          GPG_SIGNING_PASSPHRASE="$(jq -er '.GPG_SIGNING_PASSPHRASE' <<<"$VAULT_SECRETS")"
          export GPG_SIGNING_KEY GPG_SIGNING_PASSPHRASE
          .github/scripts/gpg-sign.sh sonar-migration-tool-${{ matrix.suffix }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.suffix }}
          path: |
            sonar-migration-tool-${{ matrix.suffix }}
            sonar-migration-tool-${{ matrix.suffix }}.asc
          if-no-files-found: error

  sign-macos:
    name: Sign and Notarize macOS Binaries
    needs: build-binaries
    if: env.IS_RELEASE_BRANCH == 'true'
    runs-on: macos-latest-xlarge
    permissions:
      id-token: write   # Vault OIDC
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Cloudflare WARP
        uses: SonarSource/gh-action_setup-cloudflare-warp@fe31a2b2f31595cffdef290985700732cb3469d6 # v2.1.0

      - name: Download macOS binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binary-darwin-*
          path: dist/
          merge-multiple: true

      - name: Vault Secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/kv/data/sign/apple CERTIFICATE | CERTIFICATE;
            development/kv/data/sign/apple CSC_KEY_PASSWORD | CSC_KEY_PASSWORD;
            development/kv/data/sign/apple APPLE_TEAM_ID | APPLE_TEAM_ID;
            development/kv/data/sign/apple APPLE_ID | APPLE_ID;
            development/kv/data/sign/apple APPLE_APP_SPECIFIC_PASSWORD | APPLE_APP_SPECIFIC_PASSWORD;
            development/kv/data/sign key | GPG_SIGNING_KEY;
            development/kv/data/sign passphrase | GPG_SIGNING_PASSPHRASE;

      - name: Code-sign and notarize macOS binaries
        env:
          VAULT_SECRETS: ${{ steps.secrets.outputs.vault }}
        run: |
          set -euo pipefail
          if [ -z "${VAULT_SECRETS:-}" ]; then
            echo "::error::No secrets returned from Vault — cannot code-sign/notarize. See docs/RELEASE-SIGNING-SETUP.md."
            exit 1
          fi
          CERTIFICATE="$(jq -er '.CERTIFICATE' <<<"$VAULT_SECRETS")"
          CSC_KEY_PASSWORD="$(jq -er '.CSC_KEY_PASSWORD' <<<"$VAULT_SECRETS")"
          APPLE_TEAM_ID="$(jq -er '.APPLE_TEAM_ID' <<<"$VAULT_SECRETS")"
          APPLE_ID="$(jq -er '.APPLE_ID' <<<"$VAULT_SECRETS")"
          APPLE_APP_SPECIFIC_PASSWORD="$(jq -er '.APPLE_APP_SPECIFIC_PASSWORD' <<<"$VAULT_SECRETS")"

          echo "$CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/certificate.p12 -k build.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/certificate.p12

          sign_macos_binary() {
            local binary="$1"
            local archive="/tmp/$(basename "$binary").zip"

            codesign --sign "Developer ID Application: SonarSource SA ($APPLE_TEAM_ID)" --identifier sonar-migration-tool --options runtime --timestamp "$binary"
            codesign --verify --verbose "$binary"

            zip "$archive" "$binary"
            xcrun notarytool submit "$archive" --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
            rm "$archive"
            xcrun stapler staple "$binary"
            xcrun stapler validate "$binary"
          }

          while IFS= read -r -d '' binary; do
            sign_macos_binary "$binary"
          done < <(find dist -maxdepth 1 -type f -name 'sonar-migration-tool-darwin-*' ! -name '*.asc' -print0)

      - name: Clean up build keychain
        if: always()
        run: |
          security default-keychain -s ~/Library/Keychains/login.keychain-db 2>/dev/null || true
          security delete-keychain build.keychain 2>/dev/null || true

      - name: Re-GPG-sign macOS binaries
        env:
          VAULT_SECRETS: ${{ steps.secrets.outputs.vault }}
        run: |
          set -euo pipefail
          if [ -z "${VAULT_SECRETS:-}" ]; then
            echo "::error::No secrets returned from Vault — cannot GPG-sign. See docs/RELEASE-SIGNING-SETUP.md."
            exit 1
          fi
          GPG_SIGNING_KEY="$(jq -er '.GPG_SIGNING_KEY' <<<"$VAULT_SECRETS")"
          GPG_SIGNING_PASSPHRASE="$(jq -er '.GPG_SIGNING_PASSPHRASE' <<<"$VAULT_SECRETS")"
          export GPG_SIGNING_KEY GPG_SIGNING_PASSPHRASE
          while IFS= read -r -d '' binary; do
            .github/scripts/gpg-sign.sh "$binary"
          done < <(find dist -maxdepth 1 -type f -name 'sonar-migration-tool-darwin-*' ! -name '*.asc' -print0)

      - name: Upload signed macOS binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-macos-signed
          path: dist/sonar-migration-tool-darwin-*
          if-no-files-found: error

  sign-windows:
    name: Sign Windows Binaries
    needs: build-binaries
    if: env.IS_RELEASE_BRANCH == 'true'
    runs-on: sonar-xs
    permissions:
      id-token: write   # Azure Artifact Signing OIDC
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download Windows binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binary-windows-*
          path: dist/
          merge-multiple: true

      - name: Authenticode-sign Windows binaries
        uses: SonarSource/gh-action_azure-artifact-signing@v1
        with:
          files: |
            dist/sonar-migration-tool-windows-*.exe
          signing-profile: ${{ env.SIGNING_PROFILE }}

      - name: Vault Secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/kv/data/sign key | GPG_SIGNING_KEY;
            development/kv/data/sign passphrase | GPG_SIGNING_PASSPHRASE;

      - name: Re-GPG-sign Windows binaries
        env:
          VAULT_SECRETS: ${{ steps.secrets.outputs.vault }}
        run: |
          set -euo pipefail
          if [ -z "${VAULT_SECRETS:-}" ]; then
            echo "::error::No secrets returned from Vault — cannot GPG-sign. See docs/RELEASE-SIGNING-SETUP.md."
            exit 1
          fi
          GPG_SIGNING_KEY="$(jq -er '.GPG_SIGNING_KEY' <<<"$VAULT_SECRETS")"
          GPG_SIGNING_PASSPHRASE="$(jq -er '.GPG_SIGNING_PASSPHRASE' <<<"$VAULT_SECRETS")"
          export GPG_SIGNING_KEY GPG_SIGNING_PASSPHRASE
          while IFS= read -r -d '' binary; do
            .github/scripts/gpg-sign.sh "$binary"
          done < <(find dist -maxdepth 1 -type f -name 'sonar-migration-tool-windows-*.exe' ! -name '*.asc' -print0)

      - name: Upload signed Windows binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-windows-signed
          path: dist/sonar-migration-tool-windows-*
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: [build-binaries, sign-macos, sign-windows]
    if: env.IS_MAIN_RELEASE == 'true'
    runs-on: sonar-xs
    permissions:
      contents: write
    steps:
      - name: Set release tag
        id: release
        run: |
          TAG="v$(date -u +%Y.%m.%d)-${GITHUB_RUN_NUMBER}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - name: Download all binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binary-*
          path: dist/
          merge-multiple: true

      - name: Download signed macOS binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries-macos-signed
          path: dist/

      - name: Download signed Windows binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries-windows-signed
          path: dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/sonar-migration-tool-*
